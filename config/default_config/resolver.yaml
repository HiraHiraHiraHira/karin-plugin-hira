# 多平台解析总开关
enabled: true

# Karin + KKK 兼容模式，开启后跳过 KKK 已覆盖域名
kkkCompat: true

# 自动解析优先级。保持低于 KKK 的默认最高优先级。
priority: 900

# 最大视频时长，单位秒；WebUI 中按分钟填写
maxVideoDurationSeconds: 480

# B站原生解析设置
bilibili:
  # B站下载上限，单位秒；WebUI 中按分钟填写；0 表示不限制
  maxVideoDurationSeconds: 480
  # 下载画质 qn：16=360P，32=480P，64=720P，80=1080P，112=1080P+，116=1080P60，120=4K
  quality: 64
  # 视频编码：auto=优先现代编码并在同等条件下选择低码率，avc=H.264兼容最好，hevc=H.265，av1=AV1
  codec: auto

# 抖音原生解析设置
douyin:
  # 抖音下载上限，单位秒；WebUI 中按分钟填写；0 表示不限制
  maxVideoDurationSeconds: 480
  # 视频清晰度：adapt、540p、720p、1080p、2k、4k
  quality: 1080p

# 代理，留空表示不用代理
proxy: ""

# 平台 Cookie
cookies:
  weibo: ""
  # 小黑盒帖子解析需要 Cookie，格式通常包含 x_xhh_tokenid=...
  xiaoheihe: ""
  # kkkCompat 关闭后，抖音原生解析可使用 Cookie；留空时走通用接口兜底
  douyin: ""
  # 小红书原生解析需要 Cookie
  xiaohongshu: ""
  # B站视频信息接口可选 Cookie
  bilibili: ""

# 通用解析接口。按顺序尝试。
generalApis:
  - "http://47.99.158.118/video-crack/v2/parse?content={url}"
  - "https://api.jkyai.top/API/jhspjx.php?url={url}"
  - "https://api.yujn.cn/api/pipixia.php?url={url}"
  - "https://api.bugpk.com/api/pipixia?url={url}"
