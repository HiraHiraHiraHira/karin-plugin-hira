# 多平台解析总开关
enabled: true

# Karin + KKK 兼容模式，开启后跳过 KKK 已覆盖域名
kkkCompat: true

# 是否额外发送评论/回复合并转发
commentsEnabled: true

# 自动解析优先级。保持低于 KKK 的默认最高优先级。
priority: 900

# 最大视频时长，单位秒；WebUI 中按分钟填写
maxVideoDurationSeconds: 480

# 平台开关。关闭后对应平台链接交还给后续插件或 Karin 默认流程。
platforms:
  bilibili: true
  douyin: true
  kuaishou: true
  weibo: true
  tieba: true
  xiaoheihe: true
  xiaohongshu: true
  general: true

# 发送策略
sending:
  # 是否发送正文图文伪装合并转发
  contentForwardEnabled: true
  # 视频消息发送失败时是否提示原链接/失败原因
  videoFailureFallbackEnabled: true

# 媒体策略
media:
  # 是否按资源键去重图片
  dedupeImages: true
  # 是否过滤缩略图、模糊图、马赛克图等低质量图片
  filterLowQualityImages: true
  # 是否尝试将预览卡封面内联，减少防盗链缺图
  inlinePreviewCover: true

# 诊断日志
diagnostics:
  # 是否输出 resolver 阶段日志
  stageLogsEnabled: true
  # 是否输出成功阶段的 debug 日志；关闭后仍保留失败 warn
  verboseLogsEnabled: true

# B站原生解析设置
bilibili:
  # B站下载上限，单位秒；WebUI 中按分钟填写；0 表示不限制
  maxVideoDurationSeconds: 480
  # 下载画质 qn：16=360P，32=480P，64=720P，80=1080P，112=1080P+，116=1080P60，120=4K
  quality: 64
  # 视频编码：auto=优先现代编码并在同等条件下选择低码率，avc=H.264兼容最好，hevc=H.265，av1=AV1
  codec: auto

# 抖音原生解析设置
douyin:
  # 抖音下载上限，单位秒；WebUI 中按分钟填写；0 表示不限制
  maxVideoDurationSeconds: 480
  # 视频清晰度：adapt、540p、720p、1080p、2k、4k
  quality: 1080p

# 代理，留空表示不用代理
proxy: ""

# 平台 Cookie
cookies:
  weibo: ""
  # 小黑盒帖子解析需要 Cookie，格式通常包含 x_xhh_tokenid=...
  xiaoheihe: ""
  # kkkCompat 关闭后，抖音原生解析可使用 Cookie；留空时走通用接口兜底
  douyin: ""
  # 小红书原生解析需要 Cookie
  xiaohongshu: ""
  # B站视频信息接口可选 Cookie
  bilibili: ""

# 通用解析接口。按顺序尝试。
generalApis:
  - "http://47.99.158.118/video-crack/v2/parse?content={url}"
  - "https://api.jkyai.top/API/jhspjx.php?url={url}"
  - "https://api.yujn.cn/api/pipixia.php?url={url}"
  - "https://api.bugpk.com/api/pipixia?url={url}"
